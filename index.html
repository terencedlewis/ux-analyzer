<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX Analyzer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a2e;
    }

    header p {
      margin-top: 8px;
      font-size: 1rem;
      color: #6b7280;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #f9fafb;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    textarea:focus {
      border-color: #6366f1;
      background: #ffffff;
    }

    .api-key-row {
      margin-top: 20px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #f9fafb;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: #6366f1;
      background: #ffffff;
    }

    button#analyzeBtn {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #ffffff;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      letter-spacing: 0.2px;
    }

    button#analyzeBtn:hover:not(:disabled) {
      background: #4f46e5;
    }

    button#analyzeBtn:active:not(:disabled) {
      transform: scale(0.99);
    }

    button#analyzeBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Loading spinner */
    .loader {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .loader.visible {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error-box {
      display: none;
      margin-top: 24px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      color: #b91c1c;
      font-size: 0.9rem;
    }

    .error-box.visible {
      display: block;
    }

    /* Results */
    .results {
      display: none;
      margin-top: 32px;
    }

    .results.visible {
      display: block;
    }

    .results h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1.5px solid #e5e7eb;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .section-icon.issues   { background: #fef3c7; }
    .section-icon.explain  { background: #ede9fe; }
    .section-icon.improve  { background: #d1fae5; }

    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .section-body {
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #374151;
    }

    .section-body ul {
      padding-left: 18px;
    }

    .section-body li {
      margin-bottom: 6px;
    }

    .section-body li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>UX Analyzer</h1>
    <p>Describe a UI and get actionable usability feedback powered by AI.</p>
  </header>

  <div class="card">
    <label for="uiDescription">Describe the UI</label>
    <textarea
      id="uiDescription"
      placeholder="e.g. A login page with small error messages, no password visibility toggle, and a blue submit button at the bottom."
    ></textarea>

    <div class="api-key-row">
      <label for="apiKey">OpenAI API Key</label>
      <input
        type="password"
        id="apiKey"
        placeholder="sk-..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <button id="analyzeBtn">Analyze UX</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      Analyzing your UI…
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="results" id="results">
      <h2>Analysis Results</h2>

      <div class="section">
        <div class="section-header">
          <div class="section-icon issues">⚠️</div>
          <span class="section-title">Usability Issues</span>
        </div>
        <div class="section-body" id="issuesContent"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-icon explain">🧠</div>
          <span class="section-title">Psychology Explanation</span>
        </div>
        <div class="section-body" id="explanationContent"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-icon improve">✅</div>
          <span class="section-title">Suggested Improvements</span>
        </div>
        <div class="section-body" id="improvementsContent"></div>
      </div>
    </div>
  </div>

  <script>
    const analyzeBtn     = document.getElementById('analyzeBtn');
    const uiDescription  = document.getElementById('uiDescription');
    const apiKeyInput    = document.getElementById('apiKey');
    const loader         = document.getElementById('loader');
    const errorBox       = document.getElementById('errorBox');
    const results        = document.getElementById('results');
    const issuesContent      = document.getElementById('issuesContent');
    const explanationContent = document.getElementById('explanationContent');
    const improvementsContent= document.getElementById('improvementsContent');

    analyzeBtn.addEventListener('click', async () => {
      const description = uiDescription.value.trim();
      const apiKey      = apiKeyInput.value.trim();

      // Reset state
      errorBox.classList.remove('visible');
      errorBox.textContent = '';
      results.classList.remove('visible');

      if (!description) {
        showError('Please describe a UI before analyzing.');
        return;
      }
      if (!apiKey) {
        showError('Please enter your OpenAI API key.');
        return;
      }

      setLoading(true);

      const systemPrompt = `You are an expert UX researcher. When given a UI description, respond ONLY in the following JSON format with no extra text or markdown fences:
{
  "issues": ["issue 1", "issue 2", ...],
  "explanation": ["explanation using psychology principle 1", ...],
  "improvements": ["improvement 1", "improvement 2", ...]
}
Each array should contain 3–6 concise, specific bullet points.`;

      const userPrompt = `UI Description: ${description}`;

      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user',   content: userPrompt }
            ],
            temperature: 0.7,
            max_tokens: 800
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error?.message || `API error ${response.status}`);
        }

        const data = await response.json();
        const raw  = data.choices?.[0]?.message?.content?.trim();

        let parsed;
        try {
          // Strip potential markdown fences just in case
          const cleaned = raw.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
          parsed = JSON.parse(cleaned);
        } catch {
          throw new Error('Unexpected response format from OpenAI. Please try again.');
        }

        renderSection(issuesContent,       parsed.issues       || []);
        renderSection(explanationContent,  parsed.explanation  || []);
        renderSection(improvementsContent, parsed.improvements || []);

        results.classList.add('visible');
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    function renderSection(el, items) {
      if (!Array.isArray(items) || items.length === 0) {
        el.textContent = 'No data returned for this section.';
        return;
      }
      const ul = document.createElement('ul');
      items.forEach(text => {
        const li = document.createElement('li');
        li.textContent = text;
        ul.appendChild(li);
      });
      el.innerHTML = '';
      el.appendChild(ul);
    }

    function setLoading(isLoading) {
      analyzeBtn.disabled = isLoading;
      analyzeBtn.textContent = isLoading ? 'Analyzing…' : 'Analyze UX';
      loader.classList.toggle('visible', isLoading);
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('visible');
    }
  </script>

</body>
</html>
